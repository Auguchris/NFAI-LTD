<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFAI LTD</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
<div class="container">
<a class="navbar-brand" href="#">NFAI LTD</a>
</div>
</nav>

<header class="text-center p-5 bg-light">
<h1>NFAI LTD</h1>
<p class="lead">Together for a Better Future</p>
<p>Kigali City, Kicukiro, Kanombe, Busanza</p>
</header>

<div class="container mt-5">
<h2 class="text-center mb-4">Our Products</h2>
<div class="row">

<div class="col-md-4">
<div class="card">
<img src="1.JPG" class="card-img-top">
<div class="card-body">
<h5>Office Supplies</h5>
<p>Pens, Papers, Files</p>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card">
<img src="2.JPG" class="card-img-top">
<div class="card-body">
<h5>School Materials</h5>
<p>Books, Bags, Geometry Sets</p>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card">
<img src="3.JPG" class="card-img-top">
<div class="card-body">
<h5>Printing Materials</h5>
<p>Toners, Cartridges</p>
</div>
</div>
</div>

</div>
</div>

<div class="container mt-5">
<h2 class="text-center">Place Your Order</h2>
<form id="orderForm">
<div class="mb-3">
<input type="text" id="name" class="form-control" placeholder="Your Name" required>
</div>
<div class="mb-3">
<input type="email" id="email" class="form-control" placeholder="Your Email" required>
</div>
<div class="mb-3">
<input type="text" id="product" class="form-control" placeholder="Product Name" required>
</div>
<button type="submit" class="btn btn-primary w-100">Submit Order</button>
</form>
</div>

<footer class="bg-primary text-white text-center p-3 mt-5">
Email: nfairwanda@gmail.com | © 2026 NFAI LTD
</footer>

<script src="script.js"></script>
</body>
</html>
